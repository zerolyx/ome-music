name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare managed NetEase runtime
        shell: pwsh
        run: npm run prepare:netease-runtime

      - name: Build and publish tagged Windows release
        if: startsWith(github.ref, 'refs/tags/v')
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ome Music ${{ github.ref_name }}"
          releaseBody: |
            # Ome Music ${{ github.ref_name }}

            A lightweight, immersive Windows music player with local music, NetEase Cloud Music, Bilibili atmosphere, lyrics, danmaku, and a private music curator.

            ## Download

            Use the Windows setup file generated by this release:

            - `Ome.Music_*_x64-setup.exe`

            This is an unsigned development build. Windows SmartScreen may show a warning the first time you open it.

            ## Integrity

            SHA256 hashes for every released artifact are published in the workflow logs of the "Generate SHA256 checksums" step. Verify the installer hash before opening it.

            ## Notes

            - NetEase Cloud Music uses a managed runtime included in the installer. No separate Node.js setup is required for normal users.
            - Member-only tracks are requested only with your own signed-in session. Ome Music does not bypass platform access rules.
            - Bilibili and NetEase sessions are stored on the device and should never be committed to the repository.

            Full release notes live in `docs/CHANGELOG.md`.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Build Windows installer artifact
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: npm run tauri -- build --target x86_64-pc-windows-msvc

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          if (-not (Test-Path $bundleRoot)) {
            $bundleRoot = "src-tauri/target/release/bundle"
          }
          Write-Host "Scanning $bundleRoot for release artifacts..."
          $artifacts = Get-ChildItem -Path $bundleRoot -Recurse -File -Include "*.exe","*.msi"
          if ($artifacts.Count -eq 0) {
            Write-Warning "No installer artifacts found under $bundleRoot; skipping checksum generation."
            return
          }
          $checksumFile = "sha256-checksums.txt"
          foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $artifact.FullName).Hash.ToLower()
            "$hash  $($artifact.Name)" | Out-File -FilePath $checksumFile -Append -Encoding UTF8
            Write-Host "$hash  $($artifact.FullName)"
          }
          Write-Host "::notice::SHA256 checksums written to $checksumFile"

      - name: Upload checksum artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-sha256-checksums
          path: sha256-checksums.txt
          if-no-files-found: ignore

      - name: Upload manual build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ome-music-windows-manual-build
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error
