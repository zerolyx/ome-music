name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ome Music ${{ github.ref_name }}"
          releaseBody: |
            # Ome Music ${{ github.ref_name }}

            小而美的沉浸式桌面音乐播放器，支持本地音乐、网易云音乐、Bilibili 音频与 AI 电台解说。

            > 完整版本历史见 [`docs/CHANGELOG.md`](https://github.com/zerolyx/ome-music/blob/main/docs/CHANGELOG.md)。

            ---

            ## 下载

            | 文件 | 说明 |
            |------|------|
            | `Ome.Music_*_x64-setup.exe` | Windows 安装包（NSIS，含 WebView2 引导安装） |

            > 当前版本为未签名开发发布版，Windows 首次运行时会弹出 SmartScreen 安全提示，点击"仍要运行"即可。

            ---

            ## 本次更新 / What's New in ${{ github.ref_name }}

            ### 新手引导
            - **首次启动新手引导**：打开软件时自动展示 5 步引导（欢迎 → 导入本地音乐 → 连接网易云 → 连接 Bilibili → 就绪），含进度条、步骤指示器、完成状态徽章与 CTA 按钮。
            - **跳过引导**：每一步均可点击右上角「跳过引导」按钮，跳过后不再自动弹出；设置 → 使用指南中可随时「重新查看新手引导」。

            ### 登录修复
            - **Bilibili 扫码登录修复**：将 QR 登录接口的 User-Agent 从简化的 "Mozilla/5.0 OmeMusic" 改为完整浏览器 UA（与搜索等其他 Bilibili 调用一致），并新增 Origin 与 Accept 头，解决 Bilibili passport API 拒绝非浏览器请求导致扫码失败的问题。
            - **网易云扫码登录修复**：移除多余的 `noCookie=true` 参数（login_qr_check 模块本身已在响应体返回 cookie），避免部分 API 版本下 cookie 获取异常；当扫码成功但 cookie 缺失时返回明确错误而非静默失败。
            - **更精确的错误信息**：当本地 API 服务未运行时，`request_netease_json_response` 现在先检查 Node.js 是否安装、API 包是否存在，返回精确的中文错误提示，而非笼统的"无法连接"。

            ### 其他
            - 后台同时获取网易云与 Bilibili 登录状态，设置面板关闭后同步刷新两者状态。

            ---

            ## 新手使用教程

            ### 第 1 步：安装

            1. 下载 `Ome.Music_*_x64-setup.exe`
            2. 双击运行，按提示完成安装
            3. 首次安装时会自动下载 WebView2 运行时（需联网），约 2 MB
            4. 安装完成后从开始菜单启动「Ome Music」

            ### 第 2 步：导入本地音乐

            1. 打开 Ome Music，点击顶部搜索框
            2. 输入本地音乐文件夹路径（如 `D:\Music`），按回车
            3. 软件会自动扫描并导入该文件夹下所有音频文件（mp3/flac/wav/m4a 等）

            ### 第 3 步：连接网易云音乐

            网易云音乐功能需要 NeteaseCloudMusicApi 服务。v0.2 起软件启动时会自动检测系统环境：

            - **如果已安装 Node.js v20+**：软件自动启动内置 API 服务，可直接搜索和播放
            - **如果未安装 Node.js**：屏幕中央会弹出居中提示框「缺少运行环境 Node.js」，提供三个操作：
              - 「下载 Node.js」按钮：打开 https://nodejs.org 下载 LTS 版（v20+）
              - 「重新检测」按钮：安装并重启软件后点击此按钮重新检测
              - 「稍后再说」按钮：暂不处理（仅本地音乐可正常播放）

            **方式 A（推荐新手）：安装 Node.js**
            1. 访问 https://nodejs.org 下载 LTS 版（v20+）
            2. 安装时勾选「Add to PATH」
            3. 重启 Ome Music，点击提示框中的「重新检测」即可

            **方式 B：使用外部 API 服务**
            1. 在设置 → 音乐来源中，将 NetEase Base URL 改为已部署的 API 地址
            2. 例如自建服务器地址 `http://your-server:3000`

            ### 第 4 步：登录网易云账号（播放会员歌曲）

            1. 进入设置 → 音乐来源 → NetEase Cloud Music
            2. 点击「扫码登录」用网易云 App 扫码，或粘贴 Cookie 登录
            3. 登录成功后即可播放会员歌曲（需有对应会员资格）

            ### 第 5 步：搜索与播放

            1. 在顶部搜索框输入歌曲名/歌手名
            2. 切换来源标签（本地 / 网易云 / Bilibili）
            3. 点击搜索结果即可播放

            ### 第 6 步：歌词与弹幕氛围

            - 歌词自动获取，点击右上角齿轮可调整歌词偏移
            - 在设置 → 弹幕氛围中开启弹幕效果

            ---

            ## 依赖环境说明

            | 依赖 | 是否必须 | 是否已内置 | 说明 |
            |------|----------|-----------|------|
            | WebView2 运行时 | 必须 | 安装时自动下载 | Windows 10/11 通常已自带 |
            | Node.js v20+ | 网易云功能必须 | 否，需自行安装 | 仅使用本地音乐则不需要 |
            | Windows 凭据管理器 | 必须 | 系统自带 | 用于安全存储登录凭据 |
            | 网络 | 搜索/流媒体必须 | — | 本地音乐播放不需要 |

            - **SQLite 数据库**：已静态编译进程序，无需额外安装
            - **TLS 加密**：使用 rustls 静态编译，不依赖系统 OpenSSL
            - **卸载**：通过控制面板卸载即可，卸载后会自动清理数据目录、凭据和注册表残留

            ---

            ## 系统要求

            - Windows 10 64 位及以上（需 WebView2 支持）
            - 最低 4 GB 内存
            - 100 MB 可用磁盘空间
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  # ── Docker: 网易云 API 服务镜像 ──────────────────────────────
  docker-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ome-netease-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 构建并推送 API 镜像
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Docker: Tauri Linux 构建环境镜像 ──────────────────────────
  docker-build-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ome-build-env
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: 构建并推送构建环境镜像
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
