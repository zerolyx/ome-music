name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ome Music ${{ github.ref_name }}"
          releaseBody: |
            # Ome Music ${{ github.ref_name }}

            小而美的沉浸式桌面音乐播放器，支持本地音乐、网易云音乐、Bilibili 音频与 AI 电台解说。

            ---

            ## 下载

            | 文件 | 说明 |
            |------|------|
            | `Ome.Music_*_x64-setup.exe` | Windows 安装包（NSIS，含 WebView2 引导安装） |

            > 当前版本为未签名开发发布版，Windows 首次运行时会弹出 SmartScreen 安全提示，点击"仍要运行"即可。

            ---

            ## 本次更新 / What's New in ${{ github.ref_name }}

            - **环境检测与引导安装**：启动时自动检测系统是否已安装 Node.js。若未安装，会弹出居中提示框，告知"网易云音乐功能（搜索、播放、封面、歌词）将无法运行"，并提供「下载 Node.js」「重新检测」「稍后再说」三个操作；本地音乐播放不受影响。
            - **服务状态可视化**：快捷设置面板的「网易云」来源行新增「缺少 Node.js / API 缺失」状态标签，让缺少环境的状态一目了然。
            - **更精确的错误信息**：后端在 API 不可达时先检测 Node.js 与内置 `NeteaseCloudMusicApi` 包是否存在，返回精确的失败原因，避免误判为「服务未启动」。
            - **安全的外链打开**：新增 `open_external_url` Tauri 命令，前端仅可打开 `https://` 链接（如 Node.js 下载页），杜绝任意协议跳转风险。
            - **文档完善**：`TROUBLESHOOTING.md` 与 `CONFIGURATION.md` 新增 Node.js 运行环境章节，说明本地模式与外部 API 模式两种使用方式。

            ---

            ## 新手使用教程

            ### 第 1 步：安装

            1. 下载 `Ome.Music_*_x64-setup.exe`
            2. 双击运行，按提示完成安装
            3. 首次安装时会自动下载 WebView2 运行时（需联网），约 2 MB
            4. 安装完成后从开始菜单启动「Ome Music」

            ### 第 2 步：导入本地音乐

            1. 打开 Ome Music，点击顶部搜索框
            2. 输入本地音乐文件夹路径（如 `D:\Music`），按回车
            3. 软件会自动扫描并导入该文件夹下所有音频文件（mp3/flac/wav/m4a 等）

            ### 第 3 步：连接网易云音乐

            网易云音乐功能需要 NeteaseCloudMusicApi 服务。v0.2 起软件启动时会自动检测系统环境：

            - **如果已安装 Node.js v20+**：软件自动启动内置 API 服务，可直接搜索和播放
            - **如果未安装 Node.js**：屏幕中央会弹出居中提示框「缺少运行环境 Node.js」，提供三个操作：
              - 「下载 Node.js」按钮：打开 https://nodejs.org 下载 LTS 版（v20+）
              - 「重新检测」按钮：安装并重启软件后点击此按钮重新检测
              - 「稍后再说」按钮：暂不处理（仅本地音乐可正常播放）

            **方式 A（推荐新手）：安装 Node.js**
            1. 访问 https://nodejs.org 下载 LTS 版（v20+）
            2. 安装时勾选「Add to PATH」
            3. 重启 Ome Music，点击提示框中的「重新检测」即可

            **方式 B：使用外部 API 服务**
            1. 在设置 → 音乐来源中，将 NetEase Base URL 改为已部署的 API 地址
            2. 例如自建服务器地址 `http://your-server:3000`

            ### 第 4 步：登录网易云账号（播放会员歌曲）

            1. 进入设置 → 音乐来源 → NetEase Cloud Music
            2. 点击「扫码登录」用网易云 App 扫码，或粘贴 Cookie 登录
            3. 登录成功后即可播放会员歌曲（需有对应会员资格）

            ### 第 5 步：搜索与播放

            1. 在顶部搜索框输入歌曲名/歌手名
            2. 切换来源标签（本地 / 网易云 / Bilibili）
            3. 点击搜索结果即可播放

            ### 第 6 步：歌词与弹幕氛围

            - 歌词自动获取，点击右上角齿轮可调整歌词偏移
            - 在设置 → 弹幕氛围中开启弹幕效果

            ---

            ## 依赖环境说明

            | 依赖 | 是否必须 | 是否已内置 | 说明 |
            |------|----------|-----------|------|
            | WebView2 运行时 | 必须 | 安装时自动下载 | Windows 10/11 通常已自带 |
            | Node.js v20+ | 网易云功能必须 | 否，需自行安装 | 仅使用本地音乐则不需要 |
            | Windows 凭据管理器 | 必须 | 系统自带 | 用于安全存储登录凭据 |
            | 网络 | 搜索/流媒体必须 | — | 本地音乐播放不需要 |

            - **SQLite 数据库**：已静态编译进程序，无需额外安装
            - **TLS 加密**：使用 rustls 静态编译，不依赖系统 OpenSSL
            - **卸载**：通过控制面板卸载即可，卸载后会自动清理数据目录、凭据和注册表残留

            ---

            ## 系统要求

            - Windows 10 64 位及以上（需 WebView2 支持）
            - 最低 4 GB 内存
            - 100 MB 可用磁盘空间
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
