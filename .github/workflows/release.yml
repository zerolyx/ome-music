name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ome Music ${{ github.ref_name }}"
          releaseBody: |
            # Ome Music ${{ github.ref_name }}

            A lightweight, immersive Windows music player with local music, NetEase Cloud Music, Bilibili atmosphere, lyrics, danmaku, and a private music curator.

            ## Download

            Use the Windows setup file generated by this release:

            - `Ome Music_*_x64-setup.exe`

            This is an unsigned development build. Windows SmartScreen may show a warning the first time you open it.

            ## Notes

            - NetEase Cloud Music requires either a reachable NetEaseCloudMusicApi service or a local Node.js environment that can start it.
            - Member-only tracks are requested only with your own signed-in session. Ome Music does not bypass platform access rules.
            - Bilibili and NetEase sessions are stored on the device and should never be committed to the repository.

            Full release notes live in `docs/CHANGELOG.md`.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
